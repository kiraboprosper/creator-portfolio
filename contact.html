<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Kirabo Prosper</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
body {
    background-color: #fff0f5;
}

/* Keep Theme */
.section-title {
    color: #C21833;
    font-weight: bold;
    text-align: center;
    margin-bottom: 40px;
}

/* Card Styling */
.contact-card {
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 15px 35px rgba(230, 57, 70, 0.2);
    background: white;
    transition: 0.4s ease;
}

.contact-card:hover {
    transform: translateY(-5px);
}

/* Inputs */
.form-control {
    border-radius: 12px;
    border: 1px solid #ffc2d1;
    padding: 12px;
}

.form-control:focus {
    border-color:#C21833;
    box-shadow: 0 0 0 0.2rem rgba(230,57,70,0.15);
}

/* Button */
.btn-cherry {
    background-color: #C21833;
    color: white;
    border-radius: 30px;
    padding: 10px 25px;
    transition: 0.3s ease;
}

.btn-cherry:hover {
    background-color: #C21833;
}

/* Fade animation */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
}

.fade-in.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<nav>
    <h2 >Kirabo Prosper</h2>
    <div >
        <a href="index.html" >Home</a>
        <a href="about.html" >About</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="services.html" >Services</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<section class="section container py-5">
    <h2 class="section-title">Let’s Work Together 🌸</h2>

    <div class="row justify-content-center">
        <div class="col-md-6 fade-in">
            <div class="contact-card">

                <form action="https://formsubmit.co/Kiraboprosper91@gmail.com" method="POST" id="contactForm">

                    <div class="mb-3">
                        <input type="text" name="name" class="form-control" placeholder="Your Name" required>
                    </div>

                    <div class="mb-3">
                        <input type="email" name="email" class="form-control" placeholder="Your Email" required>
                    </div>

                    <div class="mb-3">
                        <textarea name="message" class="form-control" rows="4" placeholder="Your Message" required></textarea>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-cherry" id="submitBtn">
                            Send Message ✨
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</section>

<footer class="text-center py-3">
    © 2026 Kirabo Prosper
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Fade in on scroll
const faders = document.querySelectorAll('.fade-in');

window.addEventListener('scroll', () => {
    faders.forEach(fader => {
        const rect = fader.getBoundingClientRect();
        if (rect.top < window.innerHeight - 100) {
            fader.classList.add('show');
        }
    });
});

// Button loading effect
const form = document.getElementById("contactForm");
const button = document.getElementById("submitBtn");

form.addEventListener("submit", function() {
    button.innerHTML = "Sending... 💌";
});
</script>

</body>
</html>
